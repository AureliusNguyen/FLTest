# Example: Single-variable sweep over num_rounds
# Tests that accuracy improves with more training rounds

validation:
  name: "flower_rounds_sweep"
  description: "Validate Flower accuracy improves with training rounds"
  version: "1.0"
  framework: "flower"

  base_config:
    seed: 786
    device: "cpu"
    num_clients: 5
    num_rounds: 10
    client_lr: 0.001
    client_epochs: 1
    client_batch_size: 256
    server_batch_size: 512
    dataset: "mnist"
    model_name: "LeNet"
    deterministic: true
    DATASET_DIVISION_CLIENTS: 1000
    max_test_data_size: 1024

  parameter_grid:
    mode: "single_sweep"
    sweep_parameter: "num_rounds"
    parameters:
      num_rounds:
        values: [2, 5, 10]

  expectations:
    - type: "monotonic"
      parameter: "num_rounds"
      metric: "Final Round Accuracy"
      direction: "increasing"
      tolerance: 0.05

    - type: "monotonic"
      parameter: "num_rounds"
      metric: "Final Round Loss"
      direction: "decreasing"
      tolerance: 0.1

    - type: "bounded"
      metric: "Final Round Accuracy"
      min_value: 0.0
      max_value: 1.0

  execution:
    mode: "sequential"
    timeout_seconds: 300
    continue_on_failure: true
    use_cache: true
    cache_path: "data/validator_cache"

  output:
    format: "json"
    path: "validation_results/"
    verbose: true
