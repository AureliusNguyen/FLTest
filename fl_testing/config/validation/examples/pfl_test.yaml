# Example: Apple PFL framework test
# Note: PFL always runs on CPU

validation:
  name: "pfl_rounds_sweep"
  description: "Validate Apple PFL accuracy with training rounds"
  version: "1.0"
  framework: "pfl"

  base_config:
    seed: 786
    device: "cpu"  # PFL requires CPU
    num_clients: 5
    num_rounds: 5
    client_lr: 0.001
    client_epochs: 1
    client_batch_size: 256
    server_batch_size: 512
    dataset: "mnist"
    model_name: "LeNet"
    deterministic: true
    DATASET_DIVISION_CLIENTS: 1000
    max_test_data_size: 1024

  parameter_grid:
    mode: "single_sweep"
    sweep_parameter: "num_rounds"
    parameters:
      num_rounds:
        values: [2, 5]

  expectations:
    - type: "monotonic"
      parameter: "num_rounds"
      metric: "Final Round Accuracy"
      direction: "increasing"
      tolerance: 0.1

    - type: "bounded"
      metric: "Final Round Accuracy"
      min_value: 0.0
      max_value: 1.0

  execution:
    mode: "sequential"
    timeout_seconds: 600
    continue_on_failure: true
    use_cache: true

  output:
    format: "json"
    path: "validation_results/"
