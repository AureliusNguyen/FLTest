# Example: Full combinatorial grid
# Tests multiple parameter combinations

validation:
  name: "flower_full_grid"
  description: "Full grid search over rounds and clients"
  version: "1.0"
  framework: "flower"

  base_config:
    seed: 786
    device: "cpu"
    client_lr: 0.001
    client_epochs: 1
    client_batch_size: 256
    server_batch_size: 512
    dataset: "mnist"
    model_name: "LeNet"
    deterministic: true
    DATASET_DIVISION_CLIENTS: 1000
    max_test_data_size: 1024

  parameter_grid:
    mode: "combinatorial"
    parameters:
      num_rounds:
        values: [3, 5]
      num_clients:
        values: [3, 5]

  expectations:
    - type: "bounded"
      metric: "Final Round Accuracy"
      min_value: 0.3
      max_value: 1.0

    - type: "bounded"
      metric: "Final Round Loss"
      min_value: 0.0
      max_value: 3.0

  execution:
    mode: "sequential"
    timeout_seconds: 300
    continue_on_failure: true
    use_cache: true

  output:
    format: "json"
    path: "validation_results/"
