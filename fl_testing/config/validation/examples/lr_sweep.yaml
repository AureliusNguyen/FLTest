# Example: Learning rate sensitivity test
# Tests that the model converges across different learning rates

validation:
  name: "flower_lr_sweep"
  description: "Validate Flower with different learning rates"
  version: "1.0"
  framework: "flower"

  base_config:
    seed: 786
    device: "cpu"
    num_clients: 5
    num_rounds: 5
    client_lr: 0.001
    client_epochs: 1
    client_batch_size: 256
    server_batch_size: 512
    dataset: "mnist"
    model_name: "LeNet"
    deterministic: true
    DATASET_DIVISION_CLIENTS: 1000
    max_test_data_size: 1024

  parameter_grid:
    mode: "single_sweep"
    sweep_parameter: "client_lr"
    parameters:
      client_lr:
        values: [0.0001, 0.001, 0.01]

  expectations:
    - type: "bounded"
      metric: "Final Round Accuracy"
      min_value: 0.3
      max_value: 1.0

    - type: "bounded"
      metric: "Final Round Loss"
      min_value: 0.0
      max_value: 5.0

    - type: "relative_threshold"
      parameter: "client_lr"
      metric: "Final Round Accuracy"
      max_change_percent: 80

  execution:
    mode: "sequential"
    timeout_seconds: 300
    continue_on_failure: true
    use_cache: true

  output:
    format: "json"
    path: "validation_results/"
