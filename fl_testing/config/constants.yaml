dataset_channels:
    cifar10: 3 # RGB
    femnist: 3 # Grey
    mnist: 1
    pathmnist: 3
    organamnist: 3
    superb: None
    dbpedia_14: None
    yahoo_answers_topics: None


# Training Configuration
loss_fn: CrossEntropyLoss
optimizer: Adam

# Logging Configuration (Hydra)
hydra:
    run:
        dir: .
    job_logging:
        root:
            level: INFO # Set the job logging level to INFO
        loggers:
            flwr:
                level: INFO
            accelerate.utils.other:
                level: ERROR

