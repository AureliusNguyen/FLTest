defaults:
    - constants
    - _self_


# Experiment Configuration
name: "default_experiment"
framework: flower
deterministic: True
seed: 786

# System Resources
device: cpu
total_cpus: 10
total_gpus: 0



# Dataset Configuration
dataset: mnist
data_distribution: iid
DATASET_DIVISION_CLIENTS: 1000  # Reduce dataset per client for faster simulation
dataset_cache_path: /home/gulzar/Github/fl_frameworks_testing/data/dataset_cache
max_test_data_size: 2048

# Model Configuration
model_name: 'LeNet'
model_cache_path: /home/gulzar/Github/fl_frameworks_testing/data/models_cache
channels: ${dataset_channels.${dataset}}


# Federated Learning Parameters
num_clients: 10
num_rounds: 4
client_lr: 0.001
client_epochs: 2
client_batch_size: 32
server_batch_size: 512



