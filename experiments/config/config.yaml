name: "default_experiment"
framework: flower
device: cpu


DATASET_DIVISION_CLIENTS: 1000 # to reduce dataset per client and to make simulation faster


num_clients: 2
num_rounds: 2
client_lr: 0.001
client_epochs : 2
client_batch_size: 32
server_batch_size: 2048
loss_fn: CrossEntropyLoss

dataset: cifar10
data_distribution: iid
dataset_cache_path : /home/gulzar/Github/fl_frameworks_testing/data/dataset_cache


hydra:
  run:
    dir: ../experiments/results/${now:%Y-%m-%d_%H-%M-%S}
